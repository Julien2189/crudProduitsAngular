<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Produits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Effets décoratifs -->
  <div class="scanlines" aria-hidden="true"></div>

  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="app-header-icon" aria-hidden="true">📦</div>
      <div class="app-header-text">
        <h1>Gestionnaire de produits</h1>
        <p>// inventory.sys — localStorage enabled</p>
      </div>
    </header>

    <!-- Formulaire d'ajout -->
    <section class="card">
      <p class="card-title">// nouveau produit</p>
      <div class="form-grid">
        <div class="field">
          <label for="nomProduit">Nom</label>
          <input id="nomProduit" placeholder="Ex : MacBook Pro" autocomplete="off">
        </div>
        <div class="field">
          <label for="prixProduit">Prix (€)</label>
          <input id="prixProduit" placeholder="0.00" type="number" min="0" step="0.01" autocomplete="off">
        </div>
        <div class="field">
          <label for="stockProduit">Stock</label>
          <input id="stockProduit" placeholder="0" type="number" min="0" step="1" autocomplete="off">
        </div>
        <div class="field">
          <label for="categorieProduit">Catégorie</label>
          <input id="categorieProduit" placeholder="Ex : Informatique" autocomplete="off">
        </div>
      </div>
      <button id="ajouterProduit">Ajouter au stock</button>
    </section>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">Produits</div>
        <div class="stat-value cyan" id="statCount">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Valeur totale</div>
        <div class="stat-value magenta" id="statTotal">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Prix moyen</div>
        <div class="stat-value violet" id="statAvg">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">categorie</div>
        <div class="stat-value violet" id="categorieDuProduit">—</div>
      </div>
    </div>
    
    <section class="card">
  <p class="card-title">// recherche produit</p>

  <div class="field">
    <label for="rechercheProduit">Rechercher</label>
    <input 
      id="rechercheProduit" 
      placeholder="Ex : MacBook, souris, clavier..." 
      autocomplete="off"
    >
  </div>
</section>

    <!-- Liste -->
    <div class="list-panel">
      <div class="list-head" aria-hidden="true">
        <span>Produit</span>
        <span>Prix unit.</span>
        <span>Stock</span>
        <span>Valeur</span>
        <span></span>
      </div>
      <ul id="listeProduits"></ul>
    </div>

    <!-- Total (conserve le <p> + <span> originaux) -->
    <div class="total-bar">
      <p>Valeur totale du stock : <span id="totalStock">0</span> €</p>
    </div>

  </div><!-- /.app -->
<script src="script.js"></script>
</body>
</html>
